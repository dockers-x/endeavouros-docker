name: Build and Push Docker Image

on:
  push:
    tags:
      - "*"

env:
  REGISTRY: docker.io
  IMAGE_NAME: czyt/endeavouros

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Docker image tags
        id: image-tags
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          if [[ ! "$version" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Git tag '$version' is not a valid Docker tag. Use letters, numbers, underscores, dots, and dashes only."
            exit 1
          fi

          {
            echo "tags<<EOF"
            echo "${REGISTRY}/${IMAGE_NAME}:${version}"
            echo "${REGISTRY}/${IMAGE_NAME}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          build-args: |
            SCRIPTS_SHA=${{ hashFiles('scripts/**') }}

      - name: Image details
        env:
          IMAGE_TAGS: ${{ steps.image-tags.outputs.tags }}
        run: printf '%s\n' "$IMAGE_TAGS"
